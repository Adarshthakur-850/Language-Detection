<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Detector</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            display: none;
        }
    </style>
</head>

<body>
    <h1>Language Detection</h1>
    <p>Enter text to detect its language:</p>
    <textarea id="inputText" placeholder="Type something... (Detects as you type)"
        oninput="debouncedDetect()"></textarea>

    <div id="result"></div>

    <script>
        let timeout = null;

        function debouncedDetect() {
            clearTimeout(timeout);
            timeout = setTimeout(detect, 300); // Wait 300ms after user stops typing
        }

        async function detect() {
            const text = document.getElementById('inputText').value;
            const resDiv = document.getElementById('result');

            if (!text.trim()) {
                resDiv.style.display = 'none';
                return;
            }

            resDiv.style.display = 'block';
            resDiv.innerText = "Analyzing...";

            try {
                const response = await fetch('http://localhost:8000/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();
                resDiv.innerHTML = `<strong>Detected Language:</strong> ${data.language} <br> 
                                   <small>Confidence: ${(data.confidence * 100).toFixed(2)}%</small>`;
            } catch (e) {
                resDiv.innerText = "Error connecting to API. Ensure backend is running.";
            }
        }
    </script>
</body>

</html>
